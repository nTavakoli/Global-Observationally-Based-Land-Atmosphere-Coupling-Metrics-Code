name: clim_data
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10.4
  
  # Core scientific computing
  - numpy=1.22.3
  - scipy=1.7.3
  - pandas=1.4.3
  
  # Data I/O and xarray ecosystem
  - xarray=0.20.1
  - netcdf4=1.6.2
  - netcdf-fortran=4.6.0
  - h5py=3.7.0
  - h5netcdf=1.0.2
  - cftime=1.6.2
  
  # Geospatial and climate tools
  - rasterio=1.4.3
  - cartopy=0.20.3
  - shapely=1.8.4
  - pyproj=3.3.1
  - proj=9.0.1
  - geopandas
  
  # Parallel and distributed computing
  - dask=2022.2.1
  - dask-core=2022.2.1
  - distributed=2022.2.1
  - dask-jobqueue=0.9.0
  
  # Machine learning
  - scikit-learn=1.1.1
  - joblib=1.1.0
  - shap=0.42.1
  
  # Visualization
  - matplotlib=3.5.3
  - matplotlib-base=3.5.3
  - seaborn=0.12.0
  - bokeh=3.6.3
  - plotly=5.24.1
  - holoviews=1.20.2
  - panel=1.6.2
  - param=2.2.0
  
  # Climate data specific
  - cfgrib=0.9.10.1
  - eccodes=2.27.0
  - python-eccodes=1.4.2
  - cdo=1.6.1
  - metpy=1.3.1
  - cf-units=3.2.0
  - cf_xarray=0.7.4
  - xesmf=0.6.3
  
  # Earth Engine (optional)
  - earthengine-api=1.6.9
  - google-auth=2.23.0
  - google-cloud-storage=2.11.0
  
  # MPI and parallel processing
  - mpi=1.0
  - mpi4py=4.0.0
  - esmf=8.2.0
  - esmpy=8.2.0
  
  # Data formats
  - pyarrow=7.0.0
  - zarr=2.13.3
  - netcdf4=1.6.2
  - pyhdf=0.10.5
  - numcodecs=0.10.2
  
  # Notebooks and IDE
  - jupyter=1.0.0
  - jupyterlab=3.4.4
  - ipython=8.4.0
  - ipykernel=6.9.1
  - notebook=6.4.12
  
  # Numerical/computation
  - numba=0.55.2
  - llvmlite=0.38.1
  - bottleneck=1.3.5
  - numexpr=2.8.3
  - gmpy2=2.1.5
  
  # Statistics and models
  - statsmodels=0.14.0
  - patsy=0.5.6
  - scikit-learn=1.1.1
  
  # Utilities
  - pyyaml=6.0.1
  - tqdm=4.67.1
  - click=7.1.2
  - requests=2.28.1
  
  # Compression and I/O
  - hdf4=4.2.15
  - hdf5=1.12.2
  - libzip=1.9.2
  - brotli=1.1.0
  - snappy=1.1.10
  - zstd=1.5.2
  
  # Development tools
  - cython=3.0.11
  - setuptools=63.4.1
  - pip=25.0.1
  
  # Additional dependencies
  - intake=0.6.6
  - intake-esm=2021.8.17
  - fastprogress=1.0.0
  - fasteners=0.16.3
  - cloudpickle=3.0.0
  
  - pip
  - pip:
    # Pip-only packages from your environment
    - affine==2.4.0
    - click-plugins
    - cligj
    - cssselect2
    - fpdf2==2.8.4
    - fonttools
    - brotli
    - pillow==12.0.0
    - pydyf
    - pyphen
    - pyqt5-sip
    - rasterio==1.4.3
    - tinycss2
    - tinyhtml5
    - weasyprint
    - zopfli
